<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eatzy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="./images/eatzy-icon.svg">
</head>
<body>
    <div class="container">

        <header>
            <p class="header-title">Eatzy</p>
            <p class="header-description">The best burgers and pizzas on town</p>
        </header>

        <section class="item-lists">

            <div class="item">
                <div class="icon">🍕</div>
                <div class="name-description">
                    <h2 class="item-name">Pizza</h2>
                    <p class="item-description">pepperoni,mushroom,mozarella</p>
                    <p class="item-price">$14</p>
                </div>
                <div class="add-btn">+</div>
            </div>

            <div class="divider"></div>

            <div class="item">
                <div class="icon">🍔</div>
                <div class="name-description">
                    <h2 class="item-name">Hamburger</h2>
                    <p class="item-description">beef, cheese, lettuce</p>
                    <p class="item-price">$12</p>
                </div>
                <div class="add-btn">+</div>
            </div>

            <div class="divider"></div>

            <div class="item">
                <div class="icon">🍺</div>
                <div class="name-description">
                    <h2 class="item-name">Beer</h2>
                    <p class="item-description">grain, hops, yeast, water</p>
                    <p class="item-price">$12</p>
                </div>
                <div class="add-btn">+</div>
            </div>

            <div class="divider"></div>

        </section>

        <section class="checkout-payment">

            <p class="checkout-title">Your order</p>

            <div class="checkout-items">

                <div class="checkout-item">
                    <div class="checkout-item-name">
                        <p class="checkout-item-name-title">Pizza</p>
                        <button class="remove-btn">remove</button>
                    </div>
                    <div class="checkout-item-price">$14</div>
                </div>

                <div class="checkout-item">
                    <div class="checkout-item-name">
                        <p class="checkout-item-name-title">Beer</p>
                        <button class="remove-btn">remove</button>
                    </div>
                    <div class="checkout-item-price">$12</div>
                </div>

            </div>

            <div class="divider-thick"></div>

            <div class="total-price">
                <p class="total-price-title">Total Price:</p>
                <p class="total-price-value">$26</p>
            </div>

        </section>

        <section class="order-complete-state">
            <div class="order-confirm">
                <p class="order-details">Thanks, James! Your order is on it's way!</p>
            </div>
        </section>

    </div>

    <section class="checkout-payment-modal-state">

        <div class="modal-overlay"></div>

        <div class="payment-modal">
            <h2>Enter card details</h2>
            <input type="text" id="name" name="payment" placeholder="Enter your name" required>
            <input type="number" id="card" name="payment" maxlength="19" inputmode="numeric" placeholder="Enter card number" required>
            <input type="number" id="cvv" name="payment" maxlength="3" inputmode="numeric" placeholder="CVV" required>
            <button class="pay-button">Pay</button>
        </div>

    </section>
    <script src="script.js"></script>
</body>
</html>
